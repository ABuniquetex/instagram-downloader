<!DOCTYPE html>

<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>InstaFetch - Instagram Downloader</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:Poppins,sans-serif;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.box{
background:#1e293b;
padding:40px;
border-radius:15px;
text-align:center;
width:400px;
}

h1{
margin-bottom:20px;
}

input{
width:100%;
padding:15px;
border:none;
border-radius:8px;
margin-bottom:15px;
font-size:15px;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:8px;
background:linear-gradient(45deg,#833ab4,#fd1d1d);
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
opacity:.9;
}

.footer{
margin-top:20px;
font-size:12px;
opacity:.6;
}

</style>

</head>

<body>

<div class="box">

<h1>InstaFetch</h1>

<input id="link" placeholder="Paste Instagram Reel / Post link">

<button onclick="download()">Download</button>

<div class="footer">
Public accounts only
</div>

</div>

<script>

function download(){

let url=document.getElementById("link").value;

if(!url){
alert("Paste Instagram link");
return;
}

let downloader="https://snapinsta.app/?url="+encodeURIComponent(url);

window.open(downloader,"_blank");

}

</script>

</body>

</html>
